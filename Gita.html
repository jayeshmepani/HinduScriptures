<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gitas</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="/download.png" />

  <style>
    .Gitas {
      display: grid;
      justify-content: center;
      justify-items: center;
      width: auto;
      padding-left: 1rem;
      height: 100svh;
      text-wrap: wrap;
      word-wrap: break-word;
    }

    .Gitas a {
      text-decoration: none;
      text-wrap: wrap;
      word-wrap: break-word;
      color: rgba(255, 217, 0, 0.91);
      font-size: 1em;
      box-sizing: content-box;
    }

    li::marker {
      display: grid;
      text-wrap: wrap;
      word-wrap: break-word;
      font-size: clamp(var(--min-font-size),
          calc(var(--min-font-size) + 1.5vw),
          var(--max-font-size));
    }

    .container .overview-link a {
      text-decoration: none;
      color: rgba(255, 217, 0, 0.91);
      font-size: 2.3em;
      padding-bottom: 13%;
    }

    :root {
      --min-font-size: 0.3em;
      --max-font-size: 1.7em;
      --min-width: 300px;
      --max-width: 1920px;
      --overview-min-font-size: 1.7em;
      --overview-max-font-size: 2.3em;
    }

    .container a {
      font-size: clamp(var(--min-font-size),
          calc(var(--min-font-size) + 1.5vw),
          var(--max-font-size));
      text-wrap: wrap;
      word-wrap: break-word;
    }

    .container {
      font-size: clamp(var(--min-font-size),
          calc(var(--min-font-size) + 1vw),
          var(--max-font-size));
      text-wrap: wrap;
      word-wrap: break-word;
    }

    .container .overview-link a {
      font-size: clamp(var(--overview-min-font-size),
          calc(var(--overview-min-font-size) + 1vw),
          var(--overview-max-font-size));
    }

    #GitasList li:first-child {
      padding-top: 1rem;
    }

    #GitasList li:last-child {
      padding-bottom: 1rem;
    }
    a:hover {
      padding: 0.5rem;
      display: grid;
      place-content: center;
      border: rgba(0, 255, 255, 0.01) solid 1px;
      border-radius: 0.7rem;
      -webkit-backdrop-filter: blur(1rem) saturate(222%);
      backdrop-filter: blur(1rem) saturate(222%);
      transition: backdrop-filter 0.29s ease-in-out;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="Gitas">
      <ol id="GitasList" style="color: rgba(255, 217, 0, 0.91); font-size: 29px"></ol>
    </div>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const section = ''; // Add any specific section if needed
      fetch(`/fetchFiles?section=${encodeURIComponent(section)}`)
        .then(response => response.json())
        .then(data => {
          if (data.error) {
            console.error(data.error);
            return;
          }
  
          // Render folders
          data.folders.forEach(folder => {
            const li = document.createElement("li");
            li.textContent = folder; // Display folder name as is
            li.addEventListener("click", () => redirectToGitaContent(folder)); // Navigate to folder
            document.getElementById("GitasList").appendChild(li);
          });
  
          // Render files
          data.files.forEach(file => {
            const li = document.createElement("li");
            
            // Remove file extensions for display
            const displayName = file.replace(/\.(pdf|json)$/, ""); // Removes '.pdf' or '.json'
            li.textContent = displayName; // Set display text without extension
            
            li.addEventListener("click", () => redirectToGitaContent(file)); // Navigate to file
            document.getElementById("GitasList").appendChild(li);
          });
        })
        .catch(err => console.error('Error fetching files:', err));
    });
  
    function redirectToGitaContent(filename) {
      if (filename.endsWith('.json')) {
        window.location.href = `Content(json).html?filename=${encodeURIComponent(filename)}`;
      } else if (filename.endsWith('.pdf')) {
        window.location.href = `Content(pdf).html?filename=${encodeURIComponent(filename)}`;
      } else if (filename === "Bhagvad Gita") {
        window.location.href = `BhagvadGita.html?filename=${encodeURIComponent(filename)}`;
      } else {
        console.error("Unsupported file format.");
      }
    }
  </script>  
  
</body>

</html>
